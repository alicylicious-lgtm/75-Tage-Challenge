<style>
:root{--rose:#4A7C7E;--rose-deep:#2C5F61;--rose-light:#B2D8DA;--blush:#EDF6F7;--blush-mid:#C5E8EA;--cream:#F4F9FA;--text:#1A2E2F;--text-soft:#5A7A7C;--green:#5AAA6A;--warn:#E8A030;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 80% 10%,rgba(74,124,126,.12) 0%,transparent 70%),radial-gradient(ellipse 50% 50% at 10% 80%,rgba(178,216,218,.18) 0%,transparent 70%);pointer-events:none;z-index:0;}
#loading-screen{position:fixed;inset:0;background:var(--cream);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading-flower{font-size:56px;animation:spin 2s linear infinite;}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}

  const toasts=[];

    if(from===name)return;

  });

  if(Array.isArray(self))toasts.push(...self);
  else if(self){
    toasts.push(...(self.generic||[]));
    if(sugarFailed)toasts.push(...(self.sugar||[]));
  }
  if(!toasts.length)return null;
  return toasts[Math.floor(Math.random()*toasts.length)];

// ── HELPERS ───────────────────────────────────────────────────────────────────
const getPerson=n=>PERSONS.find(p=>p.name===n);
function getToday(name){
  const diff=Math.floor((new Date()-getPerson(name).start)/86400000);
  return Math.min(Math.max(diff,0),getPerson(name).days-1);
}
const totalDays=n=>getPerson(n).days;
const totalGoal=n=>Math.round(getPerson(n).days*MAX_PTS*GOAL_PCT);
function dayDate(name,idx){
  const d=new Date(getPerson(name).start);d.setDate(d.getDate()+idx);
  return d.toLocaleDateString('de-AT',{weekday:'short',day:'2-digit',month:'2-digit'});
}
const getDayData=(name,idx)=>{const d=state[name][idx]||{};
  const sleepMins=sleepTimeToMins(d.sleepTime||'');
  const wakeMins=sleepTimeToMins(d.wakeTime||'');
  let calcHours=d.sleepHours??null;
  if(sleepMins!==null&&wakeMins!==null){
    let diff=wakeMins-sleepMins;
    if(diff<=0)diff+=1440; // overnight
    calcHours=Math.round(diff/60*10)/10;
  }
  return{water:d.water??null,schritte:d.schritte??null,training:d.training??null,sugar:d.sugar??null,read:d.read??null,photo:d.photo??null,sleepTime:d.sleepTime??'',wakeTime:d.wakeTime??'',sleepHours:calcHours,note:d.note||'',cc:d.cc||false};};

// Returns sleepTime as minutes-since-midnight (e.g. "23:30" → 1410), or null
function sleepTimeToMins(t){if(!t)return null;const[h,m]=t.split(':').map(Number);return h*60+m;}
// Returns average sleepTime (mins) over days with entries before idx, up to 14 days back
function avgSleepTime(name,idx){
  const vals=[];
  for(let i=Math.max(17,idx-14);i<idx;i++){
    const t=sleepTimeToMins(getDayData(name,i).sleepTime);
    if(t!==null)vals.push(t);
  }
  if(!vals.length)return null;
  return vals.reduce((a,b)=>a+b,0)/vals.length;
}
// Sleep score for a day: 1.5 for ≥7h, 1.5 for regularity (≤45min from avg, or first 2 entries get free pts)
function sleepScore(name,idx){
  if(idx<17)return 0;
  const d=getDayData(name,idx);
  let pts=0;
  // Duration: 1pt for ≥7h
  if(d.sleepHours!==null&&d.sleepHours>=7)pts+=1;
  // Regularity: 1pt if within ±45min of personal average
  if(d.sleepTime){
    const avg=avgSleepTime(name,idx);
    if(avg===null){
      pts+=1; // first entries: free pt for tracking
    } else {
      const diff=Math.abs(sleepTimeToMins(d.sleepTime)-avg);
      const diffMins=Math.min(diff,1440-diff);
      if(diffMins<=45)pts+=1;
    }
  }
  return pts;
}
// Bonus point: Schlafbeginn between 22:00 and 23:00
function sleepBonusPt(name,idx){
  if(idx<17)return 0;
  const d=getDayData(name,idx);
  if(!d.sleepTime)return 0;
  const mins=sleepTimeToMins(d.sleepTime);
  return (mins>=22*60&&mins<23*60)?1:0;
}
// Count earned streak savers (5 consecutive days same sleep time ±30min)
function earnedStreakSavers(name){
  const today=getToday(name);
  let earned=0,streak=0;
  let lastTime=null;
  for(let i=17;i<=today;i++){
    const t=sleepTimeToMins(getDayData(name,i).sleepTime);
    if(t===null){streak=0;lastTime=null;continue;}
    if(lastTime===null){streak=1;lastTime=t;}
    else{
      const diff=Math.min(Math.abs(t-lastTime),1440-Math.abs(t-lastTime));
      if(diff<=30){streak++;lastTime=t;}
      else{streak=1;lastTime=t;}
    }
    if(streak>0&&streak%5===0)earned++;
  }
  return earned;
}
// Used streak savers stored in person config
function usedStreakSavers(name){return getPerson(name).streakSaversUsed||0;}
function availableStreakSavers(name){return Math.max(0,earnedStreakSavers(name)-usedStreakSavers(name));}
const dayScore=(name,idx)=>TASKS.reduce((s,t)=>{
  if(t.type==='sleep') return s+sleepScore(name,idx)+sleepBonusPt(name,idx);
  const v=getDayData(name,idx)[t.key];const n=typeof v==='number'?v:0;return s+n;
},0);
function totalScore(name){let s=0;for(let i=0;i<totalDays(name);i++)s+=dayScore(name,i);return s;}
function streak(name){
  const today=getToday(name);let s=0;
  for(let i=today-1;i>=0;i--){if(dayScore(name,i)>=DAY_GOAL)s++;else break;}
  return s;
}
function daysOnTarget(name){let c=0;const t=getToday(name);for(let i=0;i<=t;i++)if(dayScore(name,i)>=DAY_GOAL)c++;return c;}
function ccDays(name){let c=0;const t=getToday(name);for(let i=0;i<=t;i++)if(getDayData(name,i).cc)c++;return c;}
function getQuote(){
  const d=Math.floor((new Date()-new Date(2026,5,2))/86400000);
  return QUOTES[Math.max(0,d)%QUOTES.length];
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

function setSyncing(on){
  const dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-text');
  if(!dot)return;
  if(on){dot.className='sync-dot syncing';txt.textContent='Wird synchronisiert…';}

}
function setError(){
  const dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-text');
  if(dot){dot.className='sync-dot error';txt.textContent='Verbindungsfehler';}
}
async function savePerson(name){
  setSyncing(true);
  try{await setDoc(doc(db,'challenge',name),{days:state[name]},{merge:true});setSyncing(false);}
  catch(e){setError();}
}

// ── PIN SYSTEM ────────────────────────────────────────────────────────────────
async function loadPins(){
  try{
    const snap=await getDoc(doc(db,'pins','pins'));
    pins=snap.exists()?snap.data():{};
  }catch(e){pins={};}
}
async function hashPin(pin){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function savePin(name,pin){
  pins[name]=await hashPin(pin);
  await setDoc(doc(db,'pins','pins'),pins,{merge:true});
}
function hasPin(name){return !!pins[name];}
async function checkPin(name,pin){return pins[name]===(await hashPin(pin));}

// ── FIREBASE LISTENERS ────────────────────────────────────────────────────────
async function initListeners(){
  await loadPins();
  let loaded=0;
  let initialized=false;
  PERSONS.forEach(p=>{
    onSnapshot(doc(db,'challenge',p.name),snap=>{
      state[p.name]=snap.exists()?(snap.data().days||{}):{};
      if(!initialized){
        loaded++;
        if(loaded>=PERSONS.length){
          initialized=true;
          document.getElementById('loading-screen').style.display='none';
          document.getElementById('app-shell').style.display='block';
          const saved=localStorage.getItem('challenge_user_v3');
          if(saved&&PERSONS.find(p=>p.name===saved)){
            currentPerson=saved;navigate('home');
          }else{navigate('login');}
        }
      } else {
        // Already initialized - just update data silently, never navigate
        setSyncing(false);
        if(window._currentPage && window._currentPage!=='login'){
          silentRender();
        }
      }
    },err=>{
      setError();loaded++;
      if(loaded>=PERSONS.length){
        document.getElementById('loading-screen').style.display='none';
        document.getElementById('app-shell').style.display='block';
        navigate('login');
      }
    });
  });
  const chatQ=query(collection(db,'chat'),orderBy('ts','desc'),limit(50));
  onSnapshot(chatQ,snap=>{
    chatMessages=snap.docs.map(d=>({id:d.id,...d.data()})).reverse();
    if(currentPerson&&document.getElementById('chat-messages'))renderChatMessages();
  });
}

function silentRender(){
  const el=document.getElementById('main-content');
  if(!el||!window._currentPage)return;
  const scrollY=window.scrollY;
  if(window._currentPage==='person')el.innerHTML=renderPerson(currentPerson,true);
  else if(window._currentPage==='person-other')el.innerHTML=renderPerson(window._currentArg,false);
  else if(window._currentPage==='overview')el.innerHTML=renderOverview();
  else if(window._currentPage==='home')el.innerHTML=renderHome();
  else if(window._currentPage==='chat'){renderChatMessages();return;}
  setTimeout(()=>window.scrollTo({top:scrollY}),10);
}
window.navigate=function(page,arg=null){
  const nav=document.getElementById('bottom-nav');
  const header=document.getElementById('app-header');
  if(page==='login'||page==='set-pin'||page==='enter-pin'){
    nav.style.display='none';header.style.display='none';document.getElementById('sync-bar-el').style.display='none';
  }else{
    nav.style.display='flex';header.style.display='block';document.getElementById('sync-bar-el').style.display='flex';
    document.getElementById('current-user-label').textContent=currentPerson+' ⚡';
    document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
    const navId=page==='person-other'?'nav-overview':'nav-'+page;
    const navEl=document.getElementById(navId);
    if(navEl)navEl.classList.add('active');
  }
  const el=document.getElementById('main-content');
  window._currentPage=page;
  window._currentArg=arg;
  if(page==='login')         el.innerHTML=renderLogin();
  else if(page==='set-pin')  el.innerHTML=renderSetPin(arg);
  else if(page==='enter-pin')el.innerHTML=renderEnterPin(arg);
  else if(page==='home')     el.innerHTML=renderHome();
  else if(page==='overview') el.innerHTML=renderOverview();
  else if(page==='person')   el.innerHTML=renderPerson(currentPerson,true);
  else if(page==='person-other') el.innerHTML=renderPerson(arg,false);
  else if(page==='chat')     {el.innerHTML=renderChatPage();setTimeout(()=>{const m=document.getElementById('chat-messages');if(m)m.scrollTop=m.scrollHeight;},100);}
  window.scrollTo({top:0,behavior:'smooth'});
};

window.pinKeyEnter=async function(k,name){
  if(k===''){return;}
  if(k==='⌫'){pinBuffer=pinBuffer.slice(0,-1);}
  else if(pinBuffer.length<4){pinBuffer+=k;}
  updatePinDisplay();
  if(pinBuffer.length===4){
    if(await checkPin(name,pinBuffer)){
      pinBuffer='';
      currentPerson=name;
      localStorage.setItem('challenge_user_v3',name);
      showToast('Willkommen zurück '+name+'! 👋');
      navigate('home');
    }else{
      const err=document.getElementById('pin-error');
      if(err)err.textContent='❌ Falscher PIN, versuch es nochmal';
      pinBuffer='';
      updatePinDisplay();
    }
  }
};

      onchange="setNote('${name}',${idx},this.value)">${d.note||''}</textarea>`;
  }else if(d.cc){
    html+=`<div style="margin-top:8px;font-size:12px;color:var(--rose-deep);">🎉 Conscious Choice Tag</div>`;
  }else if(d.note){
    html+=`<div style="margin-top:8px;font-size:12px;color:var(--text-soft);font-style:italic;">📝 ${d.note}</div>`;
  }
  html+=`</div>`;
  return html;
}

function renderChatMessagesHTML(){
  if(chatMessages.length===0)return`<div style="text-align:center;color:var(--text-soft);padding:40px 0;font-size:14px;">Noch keine Nachrichten ✨<br><span style="font-size:12px">Schreibt die erste!</span></div>`;
  return chatMessages.map(m=>renderMessage(m)).join('');
}

function renderChatMessages(){
  const el=document.getElementById('chat-messages');
  if(!el)return;
  el.innerHTML=renderChatMessagesHTML();
  el.scrollTop=el.scrollHeight;
}

function renderMessage(m){
  const isMe=m.author===currentPerson;
  const timeStr=m.ts?new Date(m.ts.toDate()).toLocaleTimeString('de-AT',{hour:'2-digit',minute:'2-digit'}):'';
  const reactions=m.reactions||{};
  const reactionHtml=Object.entries(reactions).map(([emoji,users])=>
    `<span onclick="reactTo('${m.id}','${emoji}')" style="background:${users.includes(currentPerson)?'var(--rose-light)':'var(--blush)'};border-radius:99px;padding:3px 8px;font-size:12px;cursor:pointer;">${emoji} ${users.length}</span>`
  ).join('');
  return `
  <div style="display:flex;flex-direction:column;align-items:${isMe?'flex-end':'flex-start'};">
    <div style="font-size:11px;font-weight:600;color:var(--rose-deep);margin-bottom:4px;${isMe?'text-align:right':''}">
      ${isMe?'Du':'👤 '+m.author}
      <span style="font-weight:400;color:var(--text-soft);font-size:10px;margin-left:4px">${timeStr}</span>
    </div>
    <div style="max-width:80%;background:${m.type==='gif'?'transparent':isMe?'linear-gradient(135deg,var(--rose-deep),var(--rose))':'white'};
      color:${isMe?'white':'var(--text)'};border-radius:${isMe?'18px 18px 4px 18px':'18px 18px 18px 4px'};
      padding:${m.type==='gif'?'0':'10px 14px'};font-size:14px;line-height:1.4;word-break:break-word;
      box-shadow:${m.type==='gif'?'none':'0 2px 8px rgba(201,123,132,.12)'};border:${m.type==='gif'?'none':isMe?'none':'1px solid var(--rose-light)'};">
      ${m.type==='gif'
        ? `<img src="${m.gifUrl}" style="border-radius:14px;max-width:200px;max-height:160px;display:block;" alt="GIF">`
        : m.text}
    </div>
    ${reactionHtml?`<div style="display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;">${reactionHtml}
      <span onclick="showEmojiPicker('${m.id}')" style="background:var(--blush);border-radius:99px;padding:3px 8px;font-size:12px;cursor:pointer;">+</span>
    </div>`:`<div style="margin-top:4px;"><span onclick="showEmojiPicker('${m.id}')" style="background:var(--blush);border-radius:99px;padding:3px 8px;font-size:12px;cursor:pointer;color:var(--text-soft);">+ Reaktion</span></div>`}

window.showEmojiPicker=function(msgId){
  const existing=document.getElementById('emoji-picker-'+msgId);
  if(existing){existing.remove();return;}
  document.querySelectorAll('[id^="emoji-picker-"]').forEach(el=>el.remove());
  const picker=document.createElement('div');
  picker.id='emoji-picker-'+msgId;
  picker.style.cssText='position:fixed;bottom:160px;left:50%;transform:translateX(-50%);background:white;border:1px solid var(--rose-light);border-radius:16px;padding:10px;display:flex;gap:8px;box-shadow:0 4px 20px rgba(201,123,132,.25);z-index:500;';
  picker.innerHTML=EMOJIS.map(e=>`<span onclick="reactTo('${msgId}','${e}');document.getElementById('emoji-picker-${msgId}')?.remove();" style="font-size:24px;cursor:pointer;padding:4px;">${e}</span>`).join('');

window.addEmoji=function(emoji){const input=document.getElementById('chat-input');if(input)input.value+=emoji;};
window.sendMessage=async function(){
  const input=document.getElementById('chat-input');
  if(!input||!input.value.trim())return;
  const text=input.value.trim();input.value='';
  try{await addDoc(collection(db,'chat'),{author:currentPerson,text,ts:new Date(),reactions:{}});}
  catch(e){showToast('Fehler beim Senden 😢');}
};
window.reactTo=async function(msgId,emoji){
  const msg=chatMessages.find(m=>m.id===msgId);if(!msg)return;
  const reactions={...msg.reactions||{}};
  const users=reactions[emoji]||[];
  if(users.includes(currentPerson)){
    reactions[emoji]=users.filter(u=>u!==currentPerson);
    if(reactions[emoji].length===0)delete reactions[emoji];
  }else{reactions[emoji]=[...users,currentPerson];}
  try{await setDoc(doc(db,'chat',msgId),{reactions},{merge:true});}catch(e){}
};

// ── ACTIONS ───────────────────────────────────────────────────────────────────
window.setScore=function(name,idx,key,val){
  if(name!==currentPerson){showToast('🔒 Nur '+name+' kann das ändern!');return;}
  if(!state[name][idx])state[name][idx]={};
  const prev=state[name][idx][key];
  const prevSc=dayScore(name,idx);
  state[name][idx][key]=prev===val?null:val;
  window._currentPage='person';
  window._currentArg=null;
  const scrollY=window.scrollY;
  document.getElementById('main-content').innerHTML=renderPerson(currentPerson,true);
  savePerson(name);
  const sc=dayScore(name,idx);
  const sugarFailed=getDayData(name,idx).sugar===0;
  if(sc===MAX_PTS&&prevSc<MAX_PTS)showToast('🌟 Perfekter Tag! '+randEgo(name));
  else if(sc>=DAY_GOAL&&prevSc<DAY_GOAL)showToast(randEgo(name));
  else if(sc<=5&&prevSc>5){const t=getTaunt(name,sugarFailed);if(t)showToast(t);}
  setTimeout(()=>{
    window.scrollTo({top:scrollY});
    const el=document.getElementById('day-card-'+idx);
    if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
  },30);
};
window.setNote=function(name,idx,val){if(name!==currentPerson)return;if(!state[name][idx])state[name][idx]={};state[name][idx].note=val;savePerson(name);};
window.setCC=function(name,idx,val){
  if(name!==currentPerson)return;
  if(!state[name][idx])state[name][idx]={};
  state[name][idx].cc=val;savePerson(name);
  if(val)showToast('🎉 Conscious Choice – genieß es!');
};
window.setSleepTime=function(name,idx,val){
  if(name!==currentPerson)return;
  if(!state[name][idx])state[name][idx]={};
  const prevSc=dayScore(name,idx);
  const prevBonus=sleepBonusPt(name,idx);
  const prevSavers=earnedStreakSavers(name);
  state[name][idx].sleepTime=val;
  savePerson(name);
  const scrollY=window.scrollY;
  document.getElementById('main-content').innerHTML=renderPerson(currentPerson,true);
  const sc=dayScore(name,idx);
  const newBonus=sleepBonusPt(name,idx);
  const newSavers=earnedStreakSavers(name);
  if(sc===MAX_PTS&&prevSc<MAX_PTS)showToast('🌟 Perfekter Tag! '+randEgo(name));
  else if(sc>=DAY_GOAL&&prevSc<DAY_GOAL)showToast(randEgo(name));
  else if(sc<=5&&prevSc>5){const t=getTaunt(name,getDayData(name,idx).sugar===0);if(t)showToast(t);}
  if(newBonus>prevBonus)showToast('⭐ Bonuspunkt! Schlafbeginn 22–23 Uhr 🎯');
  if(newSavers>prevSavers)showToast('🛡 Joker verdient! 5 Tage regelmäßiger Schlaf!');
  setTimeout(()=>window.scrollTo({top:scrollY}),10);
};
window.setWakeTime=function(name,idx,val){
  if(name!==currentPerson)return;
  if(!state[name][idx])state[name][idx]={};
  const prevSc=dayScore(name,idx);
  state[name][idx].wakeTime=val;
  savePerson(name);
  const scrollY=window.scrollY;
  document.getElementById('main-content').innerHTML=renderPerson(currentPerson,true);
  const sc=dayScore(name,idx);
  if(sc===MAX_PTS&&prevSc<MAX_PTS)showToast('🌟 Perfekter Tag! '+randEgo(name));
  else if(sc>=DAY_GOAL&&prevSc<DAY_GOAL)showToast(randEgo(name));
  else if(sc<=5&&prevSc>5){const t=getTaunt(name,getDayData(name,idx).sugar===0);if(t)showToast(t);}
  else if(sc>prevSc)showToast('😴 Schlafdauer berechnet: '+getDayData(name,idx).sleepHours+'h');
  setTimeout(()=>window.scrollTo({top:scrollY}),10);
};

window.searchGifs = function(query) {
  clearTimeout(gifSearchTimeout);
  gifSearchTimeout = setTimeout(async () => {
    const resultsEl = document.getElementById('gif-results');
    if(!resultsEl) return;
    resultsEl.innerHTML = '<div style="width:100%;text-align:center;padding:10px;color:var(--text-soft);font-size:12px;">Suche läuft… 🔍</div>';
    try {
      const endpoint = query.trim()
        ? `https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_KEY}&q=${encodeURIComponent(query)}&limit=18&rating=g`
        : `https://api.giphy.com/v1/gifs/trending?api_key=${GIPHY_KEY}&limit=18&rating=g`;
      const res = await fetch(endpoint);
      const data = await res.json();
      if(!data.data || data.data.length === 0) {
        resultsEl.innerHTML = '<div style="width:100%;text-align:center;padding:10px;color:var(--text-soft);font-size:12px;">Keine GIFs gefunden 😢</div>';
        return;
      }
      resultsEl.innerHTML = data.data.map(gif => `

          style="height:80px;border-radius:8px;cursor:pointer;object-fit:cover;transition:transform .15s;"
          onclick="sendGif('${gif.images.fixed_height.url}')"
          onmouseover="this.style.transform='scale(1.05)'"
          onmouseout="this.style.transform='scale(1)'"

      resultsEl.innerHTML = '<div style="width:100%;text-align:center;padding:10px;color:#E07080;font-size:12px;">Fehler beim Laden 😢</div>';

  }, 400);

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return new Uint8Array([...rawData].map(c => c.charCodeAt(0)));
}

async function registerPush(person) {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    const reg = await navigator.serviceWorker.ready;
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') return;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    await setDoc(doc(db, 'pushSubscriptions', person), {
      person,
      subscription: sub.toJSON(),
      updatedAt: new Date()
    });
  } catch(e) {
    console.warn('Push Subscription fehlgeschlagen:', e);
  }
}
