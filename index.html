<style>
:root{--rose:#4A7C7E;--rose-deep:#2C5F61;--rose-light:#B2D8DA;--blush:#EDF6F7;--blush-mid:#C5E8EA;--cream:#F4F9FA;--text:#1A2E2F;--text-soft:#5A7A7C;--green:#5AAA6A;--warn:#E8A030;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 80% 10%,rgba(74,124,126,.12) 0%,transparent 70%),radial-gradient(ellipse 50% 50% at 10% 80%,rgba(178,216,218,.18) 0%,transparent 70%);pointer-events:none;z-index:0;}
#loading-screen{position:fixed;inset:0;background:var(--cream);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading-flower{font-size:56px;animation:spin 2s linear infinite;}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.loading-text{font-family:'Playfair Display',serif;font-size:20px;color:var(--rose-deep);}
.loading-sub{font-size:13px;color:var(--text-soft);}
.app-header{background:linear-gradient(135deg,var(--rose-deep) 0%,var(--rose) 60%,#6BA0A2 100%);padding:16px 20px 20px;position:relative;overflow:hidden;}
.app-header::after{content:'⚡';position:absolute;right:-10px;top:-10px;font-size:80px;opacity:.15;}
.app-header h1{font-family:'Playfair Display',serif;font-size:20px;color:white;line-height:1.2;}
.header-user{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.current-user{color:rgba(255,255,255,.9);font-size:13px;font-weight:600;}
.logout-btn{color:rgba(255,255,255,.7);font-size:11px;cursor:pointer;background:rgba(255,255,255,.15);border:none;border-radius:99px;padding:4px 10px;font-family:'DM Sans',sans-serif;}
.sync-bar{background:rgba(44,95,97,.1);padding:5px 20px;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--rose-deep);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;}
.sync-dot.syncing{background:var(--warn);animation:pulse 1s infinite;}
.sync-dot.error{background:#E07080;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:white;border-top:1.5px solid var(--rose-light);display:flex;box-shadow:0 -2px 16px rgba(74,124,126,.12);}
.nav-item{flex:1;padding:8px 2px 12px;text-align:center;cursor:pointer;color:var(--text-soft);font-size:9px;font-weight:500;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.nav-item.active{color:var(--rose-deep);}
.nav-icon{font-size:20px;line-height:1;}
.nav-item.active .nav-icon{transform:scale(1.15);}
.main{padding:16px;max-width:480px;margin:0 auto;position:relative;z-index:1;padding-bottom:90px;}
.rule-card{background:white;border-radius:20px;padding:18px;margin-bottom:12px;box-shadow:0 2px 12px rgba(74,124,126,.09);border:1px solid var(--rose-light);}
.rule-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--rose-deep);margin-bottom:12px;}
.task-guide-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--blush);}
.task-guide-row:last-child{border-bottom:none;}
.tg-icon{font-size:20px;width:28px;text-align:center;flex-shrink:0;margin-top:1px;}
.tg-info{flex:1;}
.tg-name{font-size:13px;font-weight:600;}
.tg-pts{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;}
.pt-badge{font-size:11px;padding:2px 8px;border-radius:99px;font-weight:500;}
.pt-2{background:#D4EDDA;color:#276221;}.pt-1{background:#FFF3CD;color:#9C6500;}.pt-0{background:#FFE0E3;color:#9C0006;}
.goal-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--blush);}
.goal-row:last-child{border-bottom:none;}
.goal-label{font-size:13px;font-weight:500;}
.goal-val{font-family:'Playfair Display',serif;font-size:16px;color:var(--rose-deep);}
.cc-info{background:var(--blush);border-radius:14px;padding:14px;margin-top:4px;}
.cc-info p{font-size:13px;line-height:1.6;}
.cc-info strong{color:var(--rose-deep);}
.section-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--rose-deep);margin-bottom:14px;}
.person-card-btn{background:white;border-radius:20px;padding:18px;margin-bottom:12px;box-shadow:0 2px 16px rgba(74,124,126,.09);border:1.5px solid var(--rose-light);cursor:pointer;transition:all .2s;}
.person-card-btn:active{transform:scale(.98);}
.pcb-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.pcb-name{font-family:'Playfair Display',serif;font-size:18px;color:var(--rose-deep);}
.pcb-score{font-family:'Playfair Display',serif;font-size:22px;color:var(--rose-deep);}
.pcb-meta{font-size:11px;color:var(--text-soft);margin-top:2px;}
.progress-bar{background:var(--blush);border-radius:99px;height:8px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--rose-deep),var(--rose),#6BA0A2);border-radius:99px;transition:width .6s cubic-bezier(.34,1.56,.64,1);}
.medal-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.medal-card{flex:1;min-width:60px;background:white;border:1px solid var(--rose-light);border-radius:16px;padding:10px 6px;text-align:center;cursor:pointer;box-shadow:0 2px 8px rgba(74,124,126,.08);transition:all .2s;}
.medal-card:active{transform:scale(.96);}
.medal-icon{font-size:22px;}
.medal-name{font-size:11px;font-weight:600;color:var(--rose-deep);margin-top:3px;}
.medal-pts{font-size:10px;color:var(--text-soft);}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--rose-deep);font-size:14px;font-weight:600;cursor:pointer;margin-bottom:14px;}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.stat-card{background:white;border-radius:16px;padding:14px 10px;text-align:center;box-shadow:0 2px 12px rgba(74,124,126,.1);border:1px solid var(--rose-light);}
.stat-val{font-family:'Playfair Display',serif;font-size:26px;color:var(--rose-deep);line-height:1;}
.stat-label{font-size:10px;color:var(--text-soft);margin-top:4px;font-weight:500;text-transform:uppercase;letter-spacing:.5px;}
.progress-section{background:white;border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:0 2px 12px rgba(74,124,126,.1);border:1px solid var(--rose-light);}
.progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text-soft);margin-bottom:8px;font-weight:500;}
.streak-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#FF8C42,#FFB347);color:white;border-radius:99px;padding:4px 12px;font-size:12px;font-weight:600;margin-top:10px;}
.timeline{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;}
.day-dot{width:10px;height:10px;border-radius:50%;background:var(--blush-mid);cursor:pointer;transition:transform .15s;}
.day-dot:active{transform:scale(1.4);}
.day-dot.done-great{background:var(--green);}.day-dot.done-ok{background:var(--warn);}.day-dot.done-bad{background:#E07080;}
.day-dot.today{box-shadow:0 0 0 2px var(--rose-deep);}
.scroll-to-today{font-size:12px;color:var(--rose-deep);font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-bottom:12px;}
.day-section-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--rose-deep);margin-bottom:12px;}
.day-card{background:white;border-radius:20px;padding:18px;margin-bottom:12px;box-shadow:0 2px 16px rgba(74,124,126,.09);border:1px solid var(--rose-light);}
.day-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.day-num{font-family:'Playfair Display',serif;font-size:15px;color:var(--rose-deep);font-weight:700;}
.day-date{font-size:12px;color:var(--text-soft);}
.day-score-badge{font-size:13px;font-weight:600;padding:3px 10px;border-radius:99px;background:var(--blush);color:var(--rose-deep);}
.day-score-badge.great{background:#D4EDDA;color:#276221;}.day-score-badge.warn{background:#FFF3CD;color:#9C6500;}
.task-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--blush);}
.task-row:last-of-type{border-bottom:none;}
.task-info{display:flex;align-items:center;gap:8px;}
.task-icon{font-size:18px;width:28px;text-align:center;}
.task-name{font-size:13px;font-weight:500;}.task-sub{font-size:10px;color:var(--text-soft);}
.score-btns{display:flex;gap:5px;}
.score-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--rose-light);background:white;font-size:12px;font-weight:700;cursor:pointer;color:var(--text-soft);transition:all .15s;display:flex;align-items:center;justify-content:center;user-select:none;}
.score-btn:active{transform:scale(.92);}
.score-btn.sel-0{background:#FFC7CE;border-color:#E0808A;color:#9C0006;}
.score-btn.sel-1{background:#FFF3CD;border-color:#E0C050;color:#9C6500;}
.score-btn.sel-2{background:#D4EDDA;border-color:#5AAA6A;color:#276221;}
.score-btn.sel-photo{background:var(--blush-mid);border-color:var(--rose);color:var(--rose-deep);}

// ── STATE ─────────────────────────────────────────────────────────────────────
let state={}, currentPerson=null, chatMessages=[], pins={};
PERSONS.forEach(p=>state[p.name]={});

// ── HELPERS ───────────────────────────────────────────────────────────────────
const getPerson=n=>PERSONS.find(p=>p.name===n);
function getToday(name){
  const diff=Math.floor((new Date()-getPerson(name).start)/86400000);
  return Math.min(Math.max(diff,0),getPerson(name).days-1);
}
const totalDays=n=>getPerson(n).days;
const totalGoal=n=>Math.round(getPerson(n).days*MAX_PTS*GOAL_PCT);
function dayDate(name,idx){
  const d=new Date(getPerson(name).start);d.setDate(d.getDate()+idx);
  return d.toLocaleDateString('de-AT',{weekday:'short',day:'2-digit',month:'2-digit'});
}
const getDayData=(name,idx)=>state[name][idx]||{water:null,outdoor:null,indoor:null,sugar:null,read:null,photo:null,note:'',cc:false};
const dayScore=(name,idx)=>TASKS.reduce((s,t)=>s+(getDayData(name,idx)[t.key]??0),0);
function totalScore(name){let s=0;for(let i=0;i<totalDays(name);i++)s+=dayScore(name,i);return s;}
function streak(name){
  const today=getToday(name);let s=0;
  for(let i=today-1;i>=0;i--){if(dayScore(name,i)>=DAY_GOAL)s++;else break;}
  return s;
}
function daysOnTarget(name){let c=0;const t=getToday(name);for(let i=0;i<=t;i++)if(dayScore(name,i)>=DAY_GOAL)c++;return c;}
function ccDays(name){let c=0;const t=getToday(name);for(let i=0;i<=t;i++)if(getDayData(name,i).cc)c++;return c;}
function getQuote(){
  const d=Math.floor((new Date()-new Date(2026,5,2))/86400000);
  return QUOTES[Math.max(0,d)%QUOTES.length];
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

// ── SYNC ──────────────────────────────────────────────────────────────────────
function setSyncing(on){
  const dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-text');
  if(!dot)return;
  if(on){dot.className='sync-dot syncing';txt.textContent='Wird synchronisiert…';}
  else{dot.className='sync-dot';txt.textContent='Verbunden · Live-Sync aktiv';}
}
function setError(){
  const dot=document.getElementById('sync-dot'),txt=document.getElementById('sync-text');
  if(dot){dot.className='sync-dot error';txt.textContent='Verbindungsfehler';}
}
async function savePerson(name){
  setSyncing(true);
  try{await setDoc(doc(db,'challenge',name),{days:state[name]},{merge:true});setSyncing(false);}
  catch(e){setError();}
}

// ── PIN SYSTEM ────────────────────────────────────────────────────────────────
async function loadPins(){
  try{
    const snap=await getDoc(doc(db,'pins','pins'));
    pins=snap.exists()?snap.data():{};
  }catch(e){pins={};}
}
async function savePin(name,pin){
  pins[name]=pin;
  await setDoc(doc(db,'pins','pins'),pins,{merge:true});
}
function hasPin(name){return !!pins[name];}
function checkPin(name,pin){return pins[name]===pin;}

// ── FIREBASE LISTENERS ────────────────────────────────────────────────────────
async function initListeners(){
  await loadPins();
  let loaded=0;
  let initialized=false;
  PERSONS.forEach(p=>{
    onSnapshot(doc(db,'challenge',p.name),snap=>{
      state[p.name]=snap.exists()?(snap.data().days||{}):{};
      if(!initialized){
        loaded++;
        if(loaded>=PERSONS.length){
          initialized=true;
          document.getElementById('loading-screen').style.display='none';
          document.getElementById('app-shell').style.display='block';
          const saved=localStorage.getItem('challenge_user_v3');
          if(saved&&PERSONS.find(p=>p.name===saved)){
            currentPerson=saved;navigate('home');
          }else{navigate('login');}
        }
      } else {
        // Already initialized - just update data silently, never navigate
        setSyncing(false);
        if(window._currentPage && window._currentPage!=='login'){
          silentRender();
        }
      }
    },err=>{
      setError();loaded++;
      if(loaded>=PERSONS.length){
        document.getElementById('loading-screen').style.display='none';
        document.getElementById('app-shell').style.display='block';
        navigate('login');
      }
    });
  });
  const chatQ=query(collection(db,'chat'),orderBy('ts','desc'),limit(50));
  onSnapshot(chatQ,snap=>{
    chatMessages=snap.docs.map(d=>({id:d.id,...d.data()})).reverse();
    if(currentPerson&&document.getElementById('chat-messages'))renderChatMessages();
  });
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function silentRender(){
  const el=document.getElementById('main-content');
  if(!el||!window._currentPage)return;
  const scrollY=window.scrollY;
  if(window._currentPage==='person')el.innerHTML=renderPerson(currentPerson,true);
  else if(window._currentPage==='person-other')el.innerHTML=renderPerson(window._currentArg,false);
  else if(window._currentPage==='overview')el.innerHTML=renderOverview();
  else if(window._currentPage==='home')el.innerHTML=renderHome();
  else if(window._currentPage==='chat'){renderChatMessages();return;}
  setTimeout(()=>window.scrollTo({top:scrollY}),10);
}
window.navigate=function(page,arg=null){
  const nav=document.getElementById('bottom-nav');
  const header=document.getElementById('app-header');
  if(page==='login'||page==='set-pin'||page==='enter-pin'){
    nav.style.display='none';header.style.display='none';document.getElementById('sync-bar-el').style.display='none';
  }else{
    nav.style.display='flex';header.style.display='block';document.getElementById('sync-bar-el').style.display='flex';
    document.getElementById('current-user-label').textContent=currentPerson+' ⚡';
    document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
    const navId=page==='person-other'?'nav-overview':'nav-'+page;
    const navEl=document.getElementById(navId);
    if(navEl)navEl.classList.add('active');
  }
  const el=document.getElementById('main-content');
  window._currentPage=page;
  window._currentArg=arg;
  if(page==='login')         el.innerHTML=renderLogin();
  else if(page==='set-pin')  el.innerHTML=renderSetPin(arg);
  else if(page==='enter-pin')el.innerHTML=renderEnterPin(arg);
  else if(page==='home')     el.innerHTML=renderHome();
  else if(page==='overview') el.innerHTML=renderOverview();
  else if(page==='person')   el.innerHTML=renderPerson(currentPerson,true);
  else if(page==='person-other') el.innerHTML=renderPerson(arg,false);
  else if(page==='chat')     {el.innerHTML=renderChatPage();setTimeout(()=>{const m=document.getElementById('chat-messages');if(m)m.scrollTop=m.scrollHeight;},100);}
  window.scrollTo({top:0,behavior:'smooth'});
};
window.goToMyDays=function(){if(currentPerson)navigate('person');};
window.logout=function(){localStorage.removeItem('challenge_user_v3');currentPerson=null;navigate('login');};

let pinBuffer='';
window.pinKey=function(k){
  if(k===''){return;}
  if(k==='⌫'){pinBuffer=pinBuffer.slice(0,-1);}
  else if(pinBuffer.length<4){pinBuffer+=k;}
  updatePinDisplay();
};
function updatePinDisplay(){
  const el=document.getElementById('pin-display');
  if(!el)return;
  const filled='●'.repeat(pinBuffer.length);
  const empty='–'.repeat(4-pinBuffer.length);
  el.textContent=filled+empty;
  const btn=document.getElementById('set-pin-btn');
  if(btn){
    if(pinBuffer.length===4){btn.style.opacity='1';btn.style.pointerEvents='auto';}
    else{btn.style.opacity='.4';btn.style.pointerEvents='none';}
  }
}
window.confirmSetPin=async function(name){
  if(pinBuffer.length!==4)return;
  await savePin(name,pinBuffer);
  pinBuffer='';
  currentPerson=name;
  localStorage.setItem('challenge_user_v3',name);
  showToast('🔐 PIN gesetzt! Willkommen '+name+'! 👋');
  navigate('home');
};

function renderDayCard(name,idx,isToday,isMe){
  const d=getDayData(name,idx),sc=dayScore(name,idx);
  const badgeCls=sc>=DAY_GOAL?'great':sc>=5?'warn':'';
  const emoji=sc>=DAY_GOAL?'✅':sc>=5?'⚠️':'○';
  let html=`<div class="day-card" id="day-card-${idx}">
    <div class="day-header">
      <div><div class="day-num">${isToday?'🌟 Heute – ':''}Tag ${idx+1}</div>
           <div class="day-date">${dayDate(name,idx)}</div></div>
      <div class="day-score-badge ${badgeCls}">${emoji} ${sc}/${MAX_PTS}</div>
    </div>`;
  TASKS.forEach(task=>{
    const val=d[task.key];
    if(isMe){
      if(task.max===2){
        html+=`<div class="task-row">
          <div class="task-info"><span class="task-icon">${task.icon}</span>
            <div><div class="task-name">${task.name}</div><div class="task-sub">${task.sub}</div></div>
          </div>
          <div class="score-btns">
            ${[0,1,2].map(v=>`<button class="score-btn ${val===v?'sel-'+v:''}" onclick="setScore('${name}',${idx},'${task.key}',${v})">${v}</button>`).join('')}
          </div></div>`;
      }else{
        html+=`<div class="task-row">
          <div class="task-info"><span class="task-icon">${task.icon}</span>
            <div><div class="task-name">${task.name}</div><div class="task-sub">${task.sub}</div></div>
          </div>
          <div class="score-btns">
            <button class="score-btn ${val===0?'sel-0':''}" onclick="setScore('${name}',${idx},'${task.key}',0)">✗</button>
            <button class="score-btn ${val===1?'sel-photo':''}" onclick="setScore('${name}',${idx},'${task.key}',1)">📸</button>
          </div></div>`;
      }
    }else{
      // READ-ONLY: show values but no click handlers, visually dimmed
      if(task.max===2){
        html+=`<div class="task-row">
          <div class="task-info"><span class="task-icon">${task.icon}</span>
            <div><div class="task-name">${task.name}</div><div class="task-sub">${task.sub}</div></div>
          </div>
          <div class="score-btns">
            ${[0,1,2].map(v=>`<span class="score-btn ${val===v?'sel-'+v:''}" style="opacity:${val===v?'1':'0.3'};cursor:default;">${v}</span>`).join('')}
          </div></div>`;
      }else{
        html+=`<div class="task-row">
          <div class="task-info"><span class="task-icon">${task.icon}</span>
            <div><div class="task-name">${task.name}</div><div class="task-sub">${task.sub}</div></div>
          </div>
          <div class="score-btns">
            <span class="score-btn ${val===0?'sel-0':''}" style="opacity:${val===0?'1':'0.3'};cursor:default;">✗</span>
            <span class="score-btn ${val===1?'sel-photo':''}" style="opacity:${val===1?'1':'0.3'};cursor:default;">📸</span>
          </div></div>`;
      }
    }
  });
  if(isMe){
    html+=`<label class="cc-toggle">
      <input type="checkbox" ${d.cc?'checked':''} onchange="setCC('${name}',${idx},this.checked)">
      🎉 Conscious Choice Tag
    </label>
    <textarea class="note-input" rows="2" placeholder="Notiz… (optional)"
      onchange="setNote('${name}',${idx},this.value)">${d.note||''}</textarea>`;
  }else if(d.cc){
    html+=`<div style="margin-top:8px;font-size:12px;color:var(--rose-deep);">🎉 Conscious Choice Tag</div>`;
  }else if(d.note){
    html+=`<div style="margin-top:8px;font-size:12px;color:var(--text-soft);font-style:italic;">📝 ${d.note}</div>`;
  }
  html+=`</div>`;
  return html;
}

window.showEmojiPicker=function(msgId){
  const existing=document.getElementById('emoji-picker-'+msgId);
  if(existing){existing.remove();return;}
  document.querySelectorAll('[id^="emoji-picker-"]').forEach(el=>el.remove());
  const picker=document.createElement('div');
  picker.id='emoji-picker-'+msgId;
  picker.style.cssText='position:fixed;bottom:160px;left:50%;transform:translateX(-50%);background:white;border:1px solid var(--rose-light);border-radius:16px;padding:10px;display:flex;gap:8px;box-shadow:0 4px 20px rgba(201,123,132,.25);z-index:500;';
  picker.innerHTML=EMOJIS.map(e=>`<span onclick="reactTo('${msgId}','${e}');document.getElementById('emoji-picker-${msgId}')?.remove();" style="font-size:24px;cursor:pointer;padding:4px;">${e}</span>`).join('');
  document.body.appendChild(picker);
  setTimeout(()=>picker.remove(),3000);
};

window.addEmoji=function(emoji){const input=document.getElementById('chat-input');if(input)input.value+=emoji;};
window.sendMessage=async function(){
  const input=document.getElementById('chat-input');
  if(!input||!input.value.trim())return;
  const text=input.value.trim();input.value='';
  try{await addDoc(collection(db,'chat'),{author:currentPerson,text,ts:new Date(),reactions:{}});}
  catch(e){showToast('Fehler beim Senden 😢');}
};
window.reactTo=async function(msgId,emoji){
  const msg=chatMessages.find(m=>m.id===msgId);if(!msg)return;
  const reactions={...msg.reactions||{}};
  const users=reactions[emoji]||[];
  if(users.includes(currentPerson)){
    reactions[emoji]=users.filter(u=>u!==currentPerson);
    if(reactions[emoji].length===0)delete reactions[emoji];
  }else{reactions[emoji]=[...users,currentPerson];}
  try{await setDoc(doc(db,'chat',msgId),{reactions},{merge:true});}catch(e){}
};

// ── ACTIONS ───────────────────────────────────────────────────────────────────
window.setScore=function(name,idx,key,val){
  if(name!==currentPerson){showToast('🔒 Nur '+name+' kann das ändern!');return;}
  if(!state[name][idx])state[name][idx]={};
  const prev=state[name][idx][key];
  state[name][idx][key]=prev===val?null:val;
  // Set page BEFORE saving so onSnapshot silentRender stays on person page
  window._currentPage='person';
  window._currentArg=null;
  const scrollY=window.scrollY;
  document.getElementById('main-content').innerHTML=renderPerson(currentPerson,true);
  savePerson(name);
  const sc=dayScore(name,idx);
  if(sc===MAX_PTS)showToast('🌟 Perfekter Tag! '+MOTIVATIONS[Math.floor(Math.random()*MOTIVATIONS.length)]);
  else if(sc>=DAY_GOAL&&(prev??0)<DAY_GOAL)showToast(MOTIVATIONS[Math.floor(Math.random()*MOTIVATIONS.length)]);
  setTimeout(()=>{
    window.scrollTo({top:scrollY});
    const el=document.getElementById('day-card-'+idx);
    if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});
  },30);
};
window.setNote=function(name,idx,val){if(name!==currentPerson)return;if(!state[name][idx])state[name][idx]={};state[name][idx].note=val;savePerson(name);};
window.setCC=function(name,idx,val){
  if(name!==currentPerson)return;
  if(!state[name][idx])state[name][idx]={};
  state[name][idx].cc=val;savePerson(name);
  if(val)showToast('🎉 Conscious Choice – genieß es!');
};
window.scrollToToday=function(){const el=document.getElementById('day-card-'+getToday(currentPerson));if(el)el.scrollIntoView({behavior:'smooth',block:'start'});};
window.scrollToDay=function(idx){const el=document.getElementById('day-card-'+idx);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});};

let deferredPrompt;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;const b=document.getElementById('install-banner');if(b)b.style.display='flex';});
window.addEventListener('appinstalled',()=>{const b=document.getElementById('install-banner');if(b)b.style.display='none';showToast('🎉 App installiert!');});
window.installApp=function(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null;const b=document.getElementById('install-banner');if(b)b.style.display='none';}};


const GIPHY_KEY = 'mqion71jTMROLqYlZEdwmuDr0UQpp5Bu';
let gifSearchTimeout = null;

window.toggleGifSearch = function() {
  const area = document.getElementById('gif-search-area');
  if(!area) return;
  if(area.style.display === 'none') {
    area.style.display = 'block';
    // Load trending GIFs on open
    searchGifs('');
    document.getElementById('gif-search-input').focus();
  } else {
    area.style.display = 'none';
  }
};

window.searchGifs = function(query) {
  clearTimeout(gifSearchTimeout);
  gifSearchTimeout = setTimeout(async () => {
    const resultsEl = document.getElementById('gif-results');
    if(!resultsEl) return;
    resultsEl.innerHTML = '<div style="width:100%;text-align:center;padding:10px;color:var(--text-soft);font-size:12px;">Suche läuft… 🔍</div>';
    try {
      const endpoint = query.trim()
        ? `https://api.giphy.com/v1/gifs/search?api_key=${GIPHY_KEY}&q=${encodeURIComponent(query)}&limit=18&rating=g`
        : `https://api.giphy.com/v1/gifs/trending?api_key=${GIPHY_KEY}&limit=18&rating=g`;
      const res = await fetch(endpoint);
      const data = await res.json();
      if(!data.data || data.data.length === 0) {
        resultsEl.innerHTML = '<div style="width:100%;text-align:center;padding:10px;color:var(--text-soft);font-size:12px;">Keine GIFs gefunden 😢</div>';
        return;
      }
      resultsEl.innerHTML = data.data.map(gif => `
        <img src="${gif.images.fixed_height_small.url}" 
          style="height:80px;border-radius:8px;cursor:pointer;object-fit:cover;transition:transform .15s;"
          onclick="sendGif('${gif.images.fixed_height.url}')"
          onmouseover="this.style.transform='scale(1.05)'"
          onmouseout="this.style.transform='scale(1)'"
          alt="gif">`
      ).join('');
    } catch(e) {
      resultsEl.innerHTML = '<div style="width:100%;text-align:center;padding:10px;color:#E07080;font-size:12px;">Fehler beim Laden 😢</div>';
    }
  }, 400);
};

window.sendGif = async function(gifUrl) {
  try {
    await addDoc(collection(db,'chat'), {
      author: currentPerson,
      text: '',
      type: 'gif',
      gifUrl: gifUrl,
      ts: new Date(),
      reactions: {}
    });
    // Close GIF search
    const area = document.getElementById('gif-search-area');
    if(area) area.style.display = 'none';
    const input = document.getElementById('gif-search-input');
    if(input) input.value = '';
  } catch(e) { showToast('Fehler beim Senden 😢'); }
};
